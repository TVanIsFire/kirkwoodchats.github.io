<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // No backend config required.
    // This page now uses browser messaging (BroadcastChannel/localStorage) only.
    window.chatBackend = 'local';
  </script>
</head>
<body>
  <div id="name-prompt" class="modal">
    <div class="modal-content">
      <h2>Set Up Your Profile</h2>
      <p id="prompt-text">Enter your name and upload a profile image to join.</p>
      <input type="text" id="name-input" placeholder="Your name">
      <input type="file" id="avatar-input" accept="image/*">
      <div id="avatar-preview"></div>
      <button id="join-btn" disabled>Create Profile</button>
    </div>
  </div>

  <div id="chat-container" style="display: none;">
    <div class="chat-header">
      <div class="chat-logo">💬</div>
      <div class="chat-status">Connected</div>
    </div>
    <div id="messages"></div>
    <div id="typing-indicator" class="typing-indicator" style="display: none;"></div>
    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="chat.js"></script>
</body>
</html>
